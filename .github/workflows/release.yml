name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "v$VERSION" = "${GITHUB_REF_NAME}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match package version v$VERSION"
            exit 1
          }

      - name: Prepublish checks
        run: pnpm run prepublishOnly

      - name: Publish tested tarball
        run: npm publish /tmp/mdts-pack/markdown-it-ts-*.tgz --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
