name: Perf Regression

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref to compare against
        required: false
        default: main
      head_ref:
        description: Head ref to test; empty means current workflow ref
        required: false
        default: ''

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref || 'main' }}
          path: base
          fetch-depth: 0

      - name: Checkout head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_ref || github.sha }}
          path: head
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install deps (base)
        run: pnpm -C base install --frozen-lockfile

      - name: Build (base)
        run: pnpm -C base run build

      - name: Generate perf snapshot (base)
        run: pnpm -C base run perf:generate

      - name: Install deps (head)
        run: pnpm -C head install --frozen-lockfile

      - name: Build (head)
        run: pnpm -C head run build

      - name: Generate perf snapshot (head)
        run: pnpm -C head run perf:generate

      - name: Run parser perf threshold tests (head)
        run: pnpm -C head run test:perf-threshold

      - name: Compare perf snapshots
        run: node head/scripts/perf-compare.mjs head/docs/perf-latest.json base/docs/perf-latest.json --threshold=0.10 --min-signal-ms=0.05 --append-min-signal-ms=3
