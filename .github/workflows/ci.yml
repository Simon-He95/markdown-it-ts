name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.node == 20
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test -- --run
        env:
          CI: true

      - name: Plugin compatibility matrix
        if: matrix.node == 20
        run: pnpm run test:plugins
        env:
          CI: true

      - name: Slow stream correctness test
        if: matrix.node == 20
        run: pnpm run test:stream:slow
        env:
          CI: true

      - name: Parser performance threshold
        if: matrix.node == 20
        run: pnpm run test:perf-threshold
        env:
          CI: true

      - name: Build
        if: matrix.node == 20
        run: pnpm run build

      - name: Pack package
        if: matrix.node == 20
        run: |
          mkdir -p /tmp/markdown-it-ts-pack
          pnpm pack --pack-destination /tmp/markdown-it-ts-pack

      - name: Smoke test packed package
        if: matrix.node == 20
        run: |
          PKG="$(ls /tmp/markdown-it-ts-pack/markdown-it-ts-*.tgz)"
          mkdir -p /tmp/markdown-it-ts-smoke
          cd /tmp/markdown-it-ts-smoke
          printf '{"type":"module"}\n' > package.json
          pnpm add "$PKG" typescript@^5.9.3

          cat > smoke.mjs <<'EOF'
          import MarkdownIt, {
            EditableBuffer,
            PieceTable,
            StreamBuffer,
            UnboundedBuffer,
            chunkedParse,
            parseAsyncIterable,
            parseAsyncIterableToSink,
            parseIterable,
            parseIterableToSink,
          } from 'markdown-it-ts'
          import { withRenderer } from 'markdown-it-ts/plugins/with-renderer'
          import Renderer from 'markdown-it-ts/render/renderer'
          import { StreamBuffer as StreamBufferSubpath } from 'markdown-it-ts/stream/buffer'
          import { chunkedParse as chunkedParseSubpath } from 'markdown-it-ts/stream/chunked'
          import {
            DebouncedStreamParser,
            ThrottledStreamParser,
          } from 'markdown-it-ts/stream/debounced'
          import {
            recommendFullChunkStrategy,
            recommendStreamChunkStrategy,
          } from 'markdown-it-ts/support/chunk_recommend'
          import {
            ParserCore,
            Token as CoreToken,
          } from 'markdown-it-ts/core'
          import {
            EditableBuffer as ExperimentalEditableBuffer,
            PieceTable as ExperimentalPieceTable,
            UnboundedBuffer as ExperimentalUnboundedBuffer,
            chunkedParse as experimentalChunkedParse,
          } from 'markdown-it-ts/experimental'
          import { Token } from 'markdown-it-ts/common/token'
          import { countLines, escapeHtml } from 'markdown-it-ts/common/utils'

          const md = MarkdownIt()
          const html = md.render('# ok')

          if (html !== '<h1>ok</h1>\n')
            throw new Error(`unexpected render output: ${html}`)

          if (typeof chunkedParse !== 'function')
            throw new Error('chunkedParse export is not a function')

          if (typeof StreamBuffer !== 'function')
            throw new Error('StreamBuffer export is not a function')

          if (typeof UnboundedBuffer !== 'function')
            throw new Error('UnboundedBuffer export is not a function')

          if (typeof EditableBuffer !== 'function')
            throw new Error('EditableBuffer export is not a function')

          if (typeof PieceTable !== 'function')
            throw new Error('PieceTable export is not a function')

          if (typeof parseIterable !== 'function')
            throw new Error('parseIterable export is not a function')

          if (typeof parseAsyncIterable !== 'function')
            throw new Error('parseAsyncIterable export is not a function')

          if (typeof parseIterableToSink !== 'function')
            throw new Error('parseIterableToSink export is not a function')

          if (typeof parseAsyncIterableToSink !== 'function')
            throw new Error('parseAsyncIterableToSink export is not a function')

          if (typeof Renderer !== 'function')
            throw new Error('Renderer default export is not a function')

          if (typeof withRenderer !== 'function')
            throw new Error('withRenderer subpath export is not a function')

          if (typeof StreamBufferSubpath !== 'function')
            throw new Error('stream/buffer subpath export is not a function')

          if (typeof chunkedParseSubpath !== 'function')
            throw new Error('stream/chunked subpath export is not a function')

          if (typeof DebouncedStreamParser !== 'function')
            throw new Error('DebouncedStreamParser subpath export is not a function')

          if (typeof ThrottledStreamParser !== 'function')
            throw new Error('ThrottledStreamParser subpath export is not a function')

          if (typeof recommendFullChunkStrategy !== 'function')
            throw new Error('recommendFullChunkStrategy subpath export is not a function')

          if (typeof recommendStreamChunkStrategy !== 'function')
            throw new Error('recommendStreamChunkStrategy subpath export is not a function')

          if (typeof ParserCore !== 'function')
            throw new Error('core ParserCore export is not a function')

          if (typeof CoreToken !== 'function')
            throw new Error('core Token export is not a function')

          if (typeof experimentalChunkedParse !== 'function')
            throw new Error('experimental chunkedParse export is not a function')

          if (typeof ExperimentalEditableBuffer !== 'function')
            throw new Error('experimental EditableBuffer export is not a function')

          if (typeof ExperimentalPieceTable !== 'function')
            throw new Error('experimental PieceTable export is not a function')

          if (typeof ExperimentalUnboundedBuffer !== 'function')
            throw new Error('experimental UnboundedBuffer export is not a function')

          if (typeof Token !== 'function')
            throw new Error('Token export is not a function')

          if (escapeHtml('<>&"') !== '&lt;&gt;&amp;&quot;')
            throw new Error('common/utils escapeHtml subpath export returned unexpected output')

          if (countLines('a\nb\nc') !== 2)
            throw new Error('common/utils countLines subpath export returned unexpected output')
          EOF

          node smoke.mjs

          cat > smoke.ts <<'EOF'
          import MarkdownIt, {
            type MarkdownIt as MarkdownItInstance,
            type MarkdownItPlugin,
            EditableBuffer,
            PieceTable,
            StreamBuffer,
            UnboundedBuffer,
            parseAsyncIterable,
            parseAsyncIterableToSink,
            parseIterable,
            parseIterableToSink,
          } from 'markdown-it-ts'
          import { withRenderer } from 'markdown-it-ts/plugins/with-renderer'
          import Renderer from 'markdown-it-ts/render/renderer'
          import { StreamBuffer as StreamBufferSubpath } from 'markdown-it-ts/stream/buffer'
          import { chunkedParse as chunkedParseSubpath } from 'markdown-it-ts/stream/chunked'
          import {
            DebouncedStreamParser,
            ThrottledStreamParser,
          } from 'markdown-it-ts/stream/debounced'
          import {
            recommendFullChunkStrategy,
            recommendStreamChunkStrategy,
          } from 'markdown-it-ts/support/chunk_recommend'
          import {
            ParserCore,
            Token as CoreToken,
          } from 'markdown-it-ts/core'
          import {
            EditableBuffer as ExperimentalEditableBuffer,
            PieceTable as ExperimentalPieceTable,
            UnboundedBuffer as ExperimentalUnboundedBuffer,
            chunkedParse as experimentalChunkedParse,
          } from 'markdown-it-ts/experimental'
          import { Token } from 'markdown-it-ts/common/token'
          import { countLines, escapeHtml } from 'markdown-it-ts/common/utils'

          const plugin: MarkdownItPlugin = (md) => {
            md.core.ruler.after('inline', 'typed_smoke_rule', () => {})
          }

          const md = MarkdownIt().use(plugin)
          const html: string = md.render('# typed')
          const renderer = new Renderer()
          const token = new Token('text', '', 0)
          const core = new ParserCore()
          const coreToken = new CoreToken('text', '', 0)
          const typedMd: MarkdownItInstance = md
          const patched: MarkdownItInstance = withRenderer(typedMd)

          void html
          void renderer
          void token
          void patched
          void StreamBuffer
          void UnboundedBuffer
          void EditableBuffer
          void PieceTable
          void parseIterable
          void parseAsyncIterable
          void parseIterableToSink
          void parseAsyncIterableToSink
          void StreamBufferSubpath
          void chunkedParseSubpath
          void DebouncedStreamParser
          void ThrottledStreamParser
          void recommendFullChunkStrategy
          void recommendStreamChunkStrategy
          void core
          void coreToken
          void ExperimentalEditableBuffer
          void ExperimentalPieceTable
          void ExperimentalUnboundedBuffer
          void experimentalChunkedParse
          void countLines
          void escapeHtml
          EOF

          pnpm exec tsc smoke.ts \
            --module NodeNext \
            --moduleResolution NodeNext \
            --target ES2022 \
            --strict \
            --noEmit

      - name: Upload packed package
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: markdown-it-ts-pack
          path: /tmp/markdown-it-ts-pack/*.tgz
          if-no-files-found: error

  runtime-smoke:
    needs: quality
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Download packed package
        uses: actions/download-artifact@v4
        with:
          name: markdown-it-ts-pack
          path: /tmp/markdown-it-ts-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Runtime smoke test
        run: |
          PKG="$(ls /tmp/markdown-it-ts-pack/markdown-it-ts-*.tgz)"
          mkdir -p /tmp/markdown-it-ts-runtime-smoke
          cd /tmp/markdown-it-ts-runtime-smoke
          npm init -y
          npm pkg set type=module
          npm install "$PKG"

          cat > smoke.mjs <<'EOF'
          import MarkdownIt, {
            StreamBuffer,
            chunkedParse,
            parseIterable,
          } from 'markdown-it-ts'
          import { withRenderer } from 'markdown-it-ts/plugins/with-renderer'
          import Renderer from 'markdown-it-ts/render/renderer'
          import { StreamBuffer as StreamBufferSubpath } from 'markdown-it-ts/stream/buffer'
          import { chunkedParse as chunkedParseSubpath } from 'markdown-it-ts/stream/chunked'
          import {
            DebouncedStreamParser,
            ThrottledStreamParser,
          } from 'markdown-it-ts/stream/debounced'
          import {
            recommendFullChunkStrategy,
            recommendStreamChunkStrategy,
          } from 'markdown-it-ts/support/chunk_recommend'
          import {
            ParserCore,
            Token as CoreToken,
          } from 'markdown-it-ts/core'
          import {
            EditableBuffer as ExperimentalEditableBuffer,
            PieceTable as ExperimentalPieceTable,
            UnboundedBuffer as ExperimentalUnboundedBuffer,
            chunkedParse as experimentalChunkedParse,
          } from 'markdown-it-ts/experimental'
          import { Token } from 'markdown-it-ts/common/token'
          import { countLines, escapeHtml } from 'markdown-it-ts/common/utils'

          const md = MarkdownIt()
          const html = md.render('# ok')

          if (html !== '<h1>ok</h1>\n')
            throw new Error(`unexpected render output: ${html}`)

          if (typeof chunkedParse !== 'function')
            throw new Error('chunkedParse export is not a function')

          if (typeof parseIterable !== 'function')
            throw new Error('parseIterable export is not a function')

          if (typeof StreamBuffer !== 'function')
            throw new Error('StreamBuffer export is not a function')

          if (typeof Renderer !== 'function')
            throw new Error('Renderer default export is not a function')

          if (typeof withRenderer !== 'function')
            throw new Error('withRenderer subpath export is not a function')

          if (typeof StreamBufferSubpath !== 'function')
            throw new Error('stream/buffer subpath export is not a function')

          if (typeof chunkedParseSubpath !== 'function')
            throw new Error('stream/chunked subpath export is not a function')

          if (typeof DebouncedStreamParser !== 'function')
            throw new Error('DebouncedStreamParser subpath export is not a function')

          if (typeof ThrottledStreamParser !== 'function')
            throw new Error('ThrottledStreamParser subpath export is not a function')

          if (typeof recommendFullChunkStrategy !== 'function')
            throw new Error('recommendFullChunkStrategy subpath export is not a function')

          if (typeof recommendStreamChunkStrategy !== 'function')
            throw new Error('recommendStreamChunkStrategy subpath export is not a function')

          if (typeof ParserCore !== 'function')
            throw new Error('core ParserCore export is not a function')

          if (typeof CoreToken !== 'function')
            throw new Error('core Token export is not a function')

          if (typeof experimentalChunkedParse !== 'function')
            throw new Error('experimental chunkedParse export is not a function')

          if (typeof ExperimentalEditableBuffer !== 'function')
            throw new Error('experimental EditableBuffer export is not a function')

          if (typeof ExperimentalPieceTable !== 'function')
            throw new Error('experimental PieceTable export is not a function')

          if (typeof ExperimentalUnboundedBuffer !== 'function')
            throw new Error('experimental UnboundedBuffer export is not a function')

          if (typeof Token !== 'function')
            throw new Error('Token export is not a function')

          if (escapeHtml('<') !== '&lt;')
            throw new Error('common/utils escapeHtml subpath export returned unexpected output')

          if (countLines('a\nb') !== 1)
            throw new Error('common/utils countLines subpath export returned unexpected output')
          EOF

          node smoke.mjs
